<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Music Dash</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0a0a18; color: #fff; overflow: hidden;
    font-family: 'Trebuchet MS', system-ui, sans-serif;
  }
  #game { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ====== Pantallas overlay ====== */
  .screen {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    z-index: 10; padding: 20px; text-align: center;
  }
  .screen.active { display: flex; }

  /* Fondo degradado animado */
  .bg-gradient {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: bgShift 15s ease infinite;
  }
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Título */
  .title {
    font-size: clamp(48px, 9vw, 110px);
    font-weight: 900; letter-spacing: 4px; margin: 0;
    background: linear-gradient(90deg, #fde047, #f97316, #ec4899, #8b5cf6, #06b6d4);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    animation: shine 4s linear infinite;
    text-shadow: 0 0 40px rgba(236, 72, 153, 0.4);
  }
  @keyframes shine { to { background-position: 200% center; } }

  .tagline {
    font-size: clamp(16px, 2vw, 22px);
    margin: 16px 0 36px; opacity: 0.9; max-width: 700px; line-height: 1.5;
  }

  /* Botones premium */
  .btn {
    padding: 16px 40px; font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #ec4899, #8b5cf6);
    color: #fff; border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(236, 72, 153, 0.6); }
  .btn.secondary {
    background: transparent; border: 2px solid rgba(255,255,255,0.3);
    box-shadow: none; padding: 10px 24px; font-size: 14px;
  }
  .btn.secondary:hover { background: rgba(255,255,255,0.1); transform: none; box-shadow: none; }

  /* Selector niveles */
  .levels {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px; max-width: 1100px; width: 100%; margin-top: 32px;
  }
  .lvl-card {
    aspect-ratio: 4/3; border-radius: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    font-size: 22px; font-weight: 700; position: relative; overflow: hidden;
    border: 3px solid rgba(255,255,255,0.2);
    transition: transform 0.25s, box-shadow 0.25s;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
  }
  .lvl-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
  .lvl-card .num { font-size: 60px; opacity: 0.3; }
  .lvl-card .name { margin-top: 8px; }
  .lvl-card .diff { font-size: 13px; opacity: 0.7; margin-top: 4px; font-weight: 400; }
  .lvl-card.locked { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.6); }
  .lvl-card.locked:hover { transform: none; box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
  .lvl-card .lock { position: absolute; top: 12px; right: 14px; font-size: 22px; }
  .lvl-card .completed { position: absolute; top: 12px; left: 14px; font-size: 22px; }

  .back-btn {
    position: fixed; top: 20px; left: 20px; z-index: 11;
  }
  .reset-btn { margin-top: 32px; }

  /* HUD */
  #hud {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    padding: 10px 24px; border-radius: 50px; z-index: 5;
    display: none; gap: 24px; font-size: 16px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #hud.active { display: flex; }
  #hud .stat { display: flex; align-items: center; gap: 6px; }
  #progressBar {
    position: fixed; top: 0; left: 0; height: 4px; width: 0%;
    background: linear-gradient(90deg, #fde047, #ec4899, #8b5cf6);
    z-index: 6; transition: width 0.2s; display: none;
  }

  /* Quiz modal */
  #quiz {
    position: fixed; inset: 0; background: rgba(5, 5, 15, 0.92);
    backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 20;
  }
  #quiz.active { display: flex; }
  #quiz .box {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
    border: 2px solid rgba(139, 92, 246, 0.5);
    border-radius: 24px; padding: 36px; max-width: 680px; width: 92%;
    box-shadow: 0 30px 80px rgba(139, 92, 246, 0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
    animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #qDifficulty {
    display: inline-block; padding: 6px 16px; border-radius: 50px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .diff-Fàcil { background: #10b981; }
  .diff-Mitjana { background: #f59e0b; }
  .diff-Difícil { background: #ef4444; }
  #qText { font-size: 24px; margin: 8px 0 28px; font-weight: 600; line-height: 1.4; }
  #qOpts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  #qOpts button {
    padding: 18px; font-size: 17px; font-weight: 600;
    background: rgba(255,255,255,0.06); color: #fff;
    border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  #qOpts button:hover {
    background: rgba(139, 92, 246, 0.25); border-color: #8b5cf6;
    transform: translateY(-2px);
  }

  /* End screen */
  #endScreen .end-title {
    font-size: clamp(48px, 8vw, 90px); margin: 0;
    background: linear-gradient(90deg, #fde047, #ec4899);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  #endScreen.fail .end-title {
    background: linear-gradient(90deg, #ef4444, #f97316);
    -webkit-background-clip: text; background-clip: text;
  }
  #endScreen .end-msg { font-size: 18px; margin: 20px 0 30px; opacity: 0.9; }
  #endScreen .end-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>

<!-- ================== PANTALLA INICIO ================== -->
<div id="homeScreen" class="screen bg-gradient active">
  <h1 class="title">MUSIC DASH</h1>
  <p class="tagline">
    Salta, esquiva i demostra els teus coneixements musicals.<br>
    Cada 100 metres apareix una pregunta. Encertaràs les 10 sense morir?
  </p>
  <button class="btn" onclick="goTo('selectScreen')">▶ Jugar</button>
</div>

<!-- ================== SELECTOR NIVELL ================== -->
<div id="selectScreen" class="screen bg-gradient">
  <button class="btn secondary back-btn" onclick="goTo('homeScreen')">← Tornar</button>
  <h1 class="title" style="font-size: clamp(36px, 6vw, 60px);">Tria el teu nivell</h1>
  <div class="levels" id="levelGrid"></div>
  <button class="btn secondary reset-btn" onclick="resetProgress()">Reiniciar progrés</button>
</div>

<!-- ================== HUD ================== -->
<div id="progressBar"></div>
<div id="hud">
  <div class="stat">📏 <span id="dist">0</span>m</div>
  <div class="stat">❓ <span id="qnum">0</span>/10</div>
  <div class="stat">🎯 <span id="lvlName"></span></div>
</div>

<!-- ================== QUIZ ================== -->
<div id="quiz">
  <div class="box">
    <span id="qDifficulty"></span>
    <div id="qText"></div>
    <div id="qOpts"></div>
  </div>
</div>

<!-- ================== END ================== -->
<div id="endScreen" class="screen">
  <h1 class="end-title" id="endTitle"></h1>
  <p class="end-msg" id="endMsg"></p>
  <div class="end-buttons">
    <button class="btn" onclick="retryLevel()">🔄 Tornar-ho a provar</button>
    <button class="btn secondary" onclick="backToSelect()">Nivells</button>
  </div>
</div>

<!-- ================== JUEGO ================== -->
<div id="game"></div>

<script>
// ============================================
// BANCO DE PREGUNTAS
// ============================================
const FACILES = [
  { q: "Quants temps té un compàs de 4/4?", opts: ["2", "3", "4", "6"], correct: 2 },
  { q: "Quantes negres caben en una rodona?", opts: ["2", "4", "8", "16"], correct: 1 },
  { q: "Quantes corxeres equivalen a una negra?", opts: ["1", "2", "3", "4"], correct: 1 },
  { q: "Quina figura dura més?", opts: ["Negra", "Blanca", "Corxera", "Semicorxera"], correct: 1 },
  { q: "Quants temps val una blanca en 4/4?", opts: ["1", "2", "3", "4"], correct: 1 },
  { q: "Quantes semicorxeres hi ha en una corxera?", opts: ["1", "2", "3", "4"], correct: 1 },
  { q: "Quin número indica la figura del pols en 3/4?", opts: ["3", "4", "8", "2"], correct: 1 },
  { q: "Una rodona equival a... blanques", opts: ["1", "2", "4", "8"], correct: 1 },
  { q: "Quants temps té un compàs de 2/4?", opts: ["1", "2", "3", "4"], correct: 1 },
  { q: "Quina figura dura mig temps en 4/4?", opts: ["Negra", "Blanca", "Corxera", "Rodona"], correct: 2 }
];
const MEDIAS = [
  { q: "Quin és un compàs simple?", opts: ["6/8", "3/4", "9/8", "12/8"], correct: 1 },
  { q: "Quin és un compàs compost?", opts: ["2/4", "4/4", "6/8", "3/4"], correct: 2 },
  { q: "Una negra amb puntet equival a...", opts: ["2 corxeres", "3 corxeres", "4 corxeres", "1 corxera"], correct: 1 },
  { q: "Quantes corxeres hi ha en un compàs de 6/8?", opts: ["3", "6", "8", "12"], correct: 1 },
  { q: "El puntet afegeix a la figura...", opts: ["El seu mateix valor", "El doble", "La meitat del seu valor", "Un quart"], correct: 2 },
  { q: "Quantes semicorxeres caben en una blanca?", opts: ["4", "8", "16", "32"], correct: 1 },
  { q: "En 3/4, quantes corxeres caben en un compàs?", opts: ["3", "6", "8", "12"], correct: 1 },
  { q: "Una blanca amb puntet dura... temps en 4/4", opts: ["2", "2.5", "3", "4"], correct: 2 },
  { q: "Quin NO és un compàs simple?", opts: ["2/4", "3/4", "4/4", "9/8"], correct: 3 },
  { q: "En 6/8 el pols s'agrupa de... en...", opts: ["2 en 2", "3 en 3", "4 en 4", "6 en 6"], correct: 1 }
];
const DIFICILES = [
  { q: "En 9/8 (compost), quants polsos reals hi ha?", opts: ["2", "3", "4", "9"], correct: 1 },
  { q: "Una corxera amb puntet + semicorxera equival a...", opts: ["1 negra", "1 blanca", "2 negres", "1 corxera"], correct: 0 },
  { q: "Quin compàs compost equival a 4/4 simple?", opts: ["6/8", "9/8", "12/8", "3/8"], correct: 2 },
  { q: "Una rodona amb puntet equival a... negres", opts: ["4", "5", "6", "8"], correct: 2 },
  { q: "En 12/8, quantes corxeres caben?", opts: ["6", "8", "12", "16"], correct: 2 },
  { q: "Quantes semicorxeres hi ha en una negra amb puntet?", opts: ["4", "5", "6", "8"], correct: 2 },
  { q: "L'equivalent compost de 3/4 és...", opts: ["6/8", "9/8", "12/8", "3/8"], correct: 1 },
  { q: "Una blanca amb doble puntet dura... temps", opts: ["3", "3.25", "3.5", "3.75"], correct: 2 },
  { q: "En un compàs compost, cada pols es subdivideix en...", opts: ["2", "3", "4", "6"], correct: 1 },
  { q: "Quantes fuses hi ha en una negra?", opts: ["4", "8", "16", "32"], correct: 1 }
];

// ============================================
// NIVELLS
// ============================================
const LEVELS = [
  { name: "Inici",     diff: "Fàcil",        bgTop: 0x1e3a8a, bgBot: 0x06b6d4, ground: 0x0e7490, accent: 0xfde047, speed: 320, spawnDelay: 1300, blockChance: 0.15 },
  { name: "Jungla",    diff: "Normal",       bgTop: 0x14532d, bgBot: 0xfde047, ground: 0x166534, accent: 0xfde047, speed: 380, spawnDelay: 1100, blockChance: 0.30 },
  { name: "Cosmos",    diff: "Difícil",      bgTop: 0x4c1d95, bgBot: 0xec4899, ground: 0x5b21b6, accent: 0x22d3ee, speed: 440, spawnDelay: 950,  blockChance: 0.45 },
  { name: "Inframón",  diff: "Molt difícil", bgTop: 0x000000, bgBot: 0xdc2626, ground: 0x18181b, accent: 0x00ff88, speed: 500, spawnDelay: 800,  blockChance: 0.60 }
];

// ============================================
// PROGRESO
// ============================================
const SAVE_KEY = "musicdash_progress_v2";
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || { unlocked: 1, completed: [] }; }
  catch { return { unlocked: 1, completed: [] }; }
}
function saveProgress(p) { localStorage.setItem(SAVE_KEY, JSON.stringify(p)); }
function unlockNext(idx) {
  const p = loadProgress();
  if (!p.completed.includes(idx)) p.completed.push(idx);
  p.unlocked = Math.max(p.unlocked, Math.min(idx + 2, LEVELS.length));
  saveProgress(p);
}
function resetProgress() {
  if (confirm("Esborrar tot el progrés desat?")) {
    localStorage.removeItem(SAVE_KEY);
    renderLevels();
  }
}

// ============================================
// UTILS
// ============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildQuestionList() {
  const f = shuffle(FACILES).slice(0, 3).map(q => ({ ...q, diff: "Fàcil" }));
  const m = shuffle(MEDIAS).slice(0, 3).map(q => ({ ...q, diff: "Mitjana" }));
  const d = shuffle(DIFICILES).slice(0, 4).map(q => ({ ...q, diff: "Difícil" }));
  return [...f, ...m, ...d];
}
function hexToRGB(h) { return { r: (h>>16)&0xff, g: (h>>8)&0xff, b: h&0xff }; }
function rgbToHex(r,g,b) { return (r<<16)|(g<<8)|b; }

// ============================================
// SPRITE PIXEL ART (cubo con cara)
// ============================================
const SPRITE_PIXELS = [
  "..1111111111..",
  ".122222222221.",
  "12233333333321",
  "12344444444321",
  "12355445544321",
  "12355445544321",
  "12344444444321",
  "12344466644321",
  "12344466644321",
  "12344444444321",
  "12333333333321",
  "12222222222221",
  "11111111111111",
  ".1..........1.",
  ".11........11."
];
const SPRITE_COLORS = {
  "1": "#000000", "2": "#fde68a", "3": "#fbbf24",
  "4": "#f59e0b", "5": "#ffffff", "6": "#1f1f1f"
};
function generatePlayerTexture(scene) {
  if (scene.textures.exists("player")) return;
  const px = 4;
  const w = SPRITE_PIXELS[0].length * px;
  const h = SPRITE_PIXELS.length * px;
  const cnv = document.createElement("canvas");
  cnv.width = w; cnv.height = h;
  const ctx = cnv.getContext("2d");
  for (let y = 0; y < SPRITE_PIXELS.length; y++) {
    for (let x = 0; x < SPRITE_PIXELS[y].length; x++) {
      const c = SPRITE_PIXELS[y][x];
      if (SPRITE_COLORS[c]) {
        ctx.fillStyle = SPRITE_COLORS[c];
        ctx.fillRect(x * px, y * px, px, px);
      }
    }
  }
  scene.textures.addCanvas("player", cnv);
}
// Textura PINCHO con Graphics → generateTexture (método estándar Phaser)
function generateSpikeTexture(scene, key, color) {
  if (scene.textures.exists(key)) return;
  const SIZE = 40;
  const g = scene.make.graphics({ x: 0, y: 0, add: false });
  // Triángulo relleno
  g.fillStyle(color, 1);
  g.beginPath();
  g.moveTo(SIZE / 2, 2);
  g.lineTo(SIZE - 2, SIZE - 2);
  g.lineTo(2, SIZE - 2);
  g.closePath();
  g.fillPath();
  // Borde negro
  g.lineStyle(3, 0x000000, 1);
  g.beginPath();
  g.moveTo(SIZE / 2, 2);
  g.lineTo(SIZE - 2, SIZE - 2);
  g.lineTo(2, SIZE - 2);
  g.closePath();
  g.strokePath();
  // Brillo
  g.fillStyle(0xffffff, 0.5);
  g.fillRect(SIZE / 2 - 2, SIZE - 14, 4, 8);
  g.generateTexture(key, SIZE, SIZE);
  g.destroy();
}

// Textura BLOQUE
function generateBlockTexture(scene, key, color, accent) {
  if (scene.textures.exists(key)) return;
  const SIZE = 40;
  const g = scene.make.graphics({ x: 0, y: 0, add: false });
  g.fillStyle(color, 1);
  g.fillRect(0, 0, SIZE, SIZE);
  g.lineStyle(3, 0x000000, 1);
  g.strokeRect(0, 0, SIZE, SIZE);
  g.fillStyle(accent, 1);
  g.fillRect(4, 4, SIZE - 8, 4);
  g.fillStyle(0x000000, 0.25);
  g.fillRect(8, 14, SIZE - 16, 3);
  g.fillRect(8, 24, SIZE - 16, 3);
  g.generateTexture(key, SIZE, SIZE);
  g.destroy();
}

// Textura partícula (círculo difuminado)
function generateParticleTexture(scene) {
  if (scene.textures.exists("spark")) return;
  const cnv = document.createElement("canvas");
  cnv.width = 16; cnv.height = 16;
  const ctx = cnv.getContext("2d");
  const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.4, "rgba(255,255,255,0.6)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 16, 16);
  scene.textures.addCanvas("spark", cnv);
}

// ============================================
// PHASER GAME
// ============================================
let game = null;
let currentLevel = 0;

class GameScene extends Phaser.Scene {
  constructor() { super("GameScene"); }

  init(data) {
    this.levelIdx = data.level;
    this.levelData = LEVELS[data.level];
    this.questions = buildQuestionList();
    this.qIndex = 0;
    this.distance = 0;
    this.lastQuizDist = 0;
    this.paused = false;
    this.dead = false;
    this.gameStarted = false;
  }

  create() {
    const W = this.scale.width, H = this.scale.height;
    generatePlayerTexture(this);
    generateParticleTexture(this);
    // Texturas únicas por nivel para evitar caché entre partidas
    this.spikeKey = "spike_L" + this.levelIdx;
    this.blockKey = "block_L" + this.levelIdx;
    if (this.textures.exists(this.spikeKey)) this.textures.remove(this.spikeKey);
    if (this.textures.exists(this.blockKey)) this.textures.remove(this.blockKey);
    generateSpikeTexture(this, this.spikeKey, this.levelData.obstacle);
    generateBlockTexture(this, this.blockKey, this.levelData.ground, this.levelData.accent);

    // ===== Fondo degradado vertical =====
    const bgGfx = this.add.graphics();
    const top = hexToRGB(this.levelData.bgTop);
    const bot = hexToRGB(this.levelData.bgBot);
    const steps = 60;
    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      const r = Math.round(top.r + (bot.r - top.r) * t);
      const g = Math.round(top.g + (bot.g - top.g) * t);
      const b = Math.round(top.b + (bot.b - top.b) * t);
      bgGfx.fillStyle(rgbToHex(r,g,b), 1);
      bgGfx.fillRect(0, (H/steps)*i, W, H/steps + 1);
    }

    // ===== Estrellas / partículas de fondo =====
    this.bgStars = [];
    for (let i = 0; i < 40; i++) {
      const s = this.add.circle(
        Phaser.Math.Between(0, W),
        Phaser.Math.Between(0, H * 0.7),
        Phaser.Math.Between(1, 3),
        0xffffff, Phaser.Math.FloatBetween(0.2, 0.8)
      );
      s.speed = Phaser.Math.FloatBetween(20, 60);
      this.bgStars.push(s);
    }

    // ===== Suelo =====
    this.groundY = H - 90;
    this.groundRect = this.add.rectangle(W / 2, this.groundY + 45, W, 90, this.levelData.ground);
    // Línea de neón en el suelo
    this.add.rectangle(W / 2, this.groundY, W, 3, this.levelData.accent).setAlpha(0.9);
    this.add.rectangle(W / 2, this.groundY, W, 8, this.levelData.accent).setAlpha(0.2);

    // ===== Jugador =====
    this.player = this.add.image(150, this.groundY - 30, "player");
    this.physics.add.existing(this.player);
    this.player.body.setSize(48, 48);
    this.player.body.setOffset(4, 4);
    this.player.body.setGravityY(2200);
    this.player.body.setMaxVelocity(1000, 1500);

    // Suelo invisible para colisión
    this.groundBody = this.add.rectangle(W / 2, this.groundY + 45, W * 10, 90, 0x000000, 0);
    this.physics.add.existing(this.groundBody, true);
    this.physics.add.collider(this.player, this.groundBody, () => {
      if (this.player.angle % 360 !== 0) this.player.angle = 0;
    });

    // ===== Trail de partículas detrás del jugador =====
    this.trail = this.add.particles(0, 0, "spark", {
      follow: this.player,
      followOffset: { x: -20, y: 8 },
      lifespan: 400,
      speed: { min: 10, max: 40 },
      scale: { start: 0.8, end: 0 },
      alpha: { start: 0.7, end: 0 },
      tint: this.levelData.accent,
      frequency: 30,
      blendMode: "ADD"
    });

    // ===== Grupos =====
    this.spikes = this.physics.add.group();
    this.blocks = this.physics.add.group();
    this.physics.add.overlap(this.player, this.spikes, () => this.die(), null, this);
    this.physics.add.collider(this.player, this.blocks, (p, b) => this.handleBlockCollision(p, b), null, this);

    // ===== Patrones (strings tipo nivel GD) =====
    // ^ = pincho, # = bloque suelo, = = bloque elevado, . = vacío
    // Cada char ocupa TILE píxeles
    this.TILE = 40;
    this.PATTERNS = [
      "....^.....",
      "...^.^....",
      "..^...^...",
      "...##.....",
      "..#==#....",
      "...^#.....",
      "..^..##...",
      "...####...",
      "..^^...^^.",
      "...=.=....",
      "..#.^.#...",
      "....^^...."
    ];
    this.nextSpawnX = W + 200;
    // Lanza un patrón inicial inmediato y luego revisa cada 100ms
    this.time.delayedCall(800, () => this.spawnPattern(W + 100));
    this.spawnTimer = this.time.addEvent({
      delay: 100,
      callback: () => this.maybeSpawnNext(),
      loop: true
    });

    // ===== Input =====
    this.input.on("pointerdown", () => this.jump());
    this.input.keyboard.on("keydown-SPACE", () => this.jump());
    this.input.keyboard.on("keydown-UP", () => this.jump());
    this.input.keyboard.on("keydown-W", () => this.jump());

    // Manten pulsado para salto continuo
    this.jumpHeld = false;
    this.input.on("pointerdown", () => this.jumpHeld = true);
    this.input.on("pointerup", () => this.jumpHeld = false);
    this.input.keyboard.on("keydown-SPACE", () => this.jumpHeld = true);
    this.input.keyboard.on("keyup-SPACE", () => this.jumpHeld = false);

    // HUD
    document.getElementById("hud").classList.add("active");
    document.getElementById("progressBar").style.display = "block";
    document.getElementById("lvlName").textContent = this.levelData.name;
    this.gameStarted = true;
  }

  jump() {
    if (this.paused || this.dead) return;
    const onGround = this.player.body.touching.down || this.player.body.blocked.down;
    if (onGround) {
      this.player.body.setVelocityY(-820);
      this.tweens.add({
        targets: this.player, angle: this.player.angle + 360, duration: 550, ease: "Linear"
      });
    }
  }

  maybeSpawnNext() {
    if (this.paused || this.dead) return;
    const W = this.scale.width;
    if (this.nextSpawnX <= W + 50) {
      this.spawnPattern(this.nextSpawnX);
    }
  }

  spawnPattern(startX) {
    const pattern = Phaser.Utils.Array.GetRandom(this.PATTERNS);
    const T = this.TILE;
    for (let i = 0; i < pattern.length; i++) {
      const ch = pattern[i];
      const x = startX + i * T;
      if (ch === "^") this.spawnSpike(x);
      else if (ch === "#") this.spawnBlock(x, this.groundY - T / 2);
      else if (ch === "=") this.spawnBlock(x, this.groundY - T - T / 2);
    }
    const gap = Phaser.Math.Between(3, 5);
    this.nextSpawnX = startX + (pattern.length + gap) * T;
  }

  spawnSpike(x) {
    const T = this.TILE;
    const spike = this.physics.add.image(x, this.groundY - T / 2, this.spikeKey);
    spike.body.setSize(T * 0.55, T * 0.7);
    spike.body.setOffset(T * 0.225, T * 0.25);
    spike.body.setAllowGravity(false);
    spike.body.setVelocityX(-this.levelData.speed);
    spike.body.setImmovable(true);
    this.spikes.add(spike);
  }

  spawnBlock(x, y) {
    const T = this.TILE;
    const block = this.physics.add.image(x, y, this.blockKey);
    block.body.setAllowGravity(false);
    block.body.setVelocityX(-this.levelData.speed);
    block.body.setImmovable(true);
    this.blocks.add(block);
  }

  handleBlockCollision(player, block) {
    const playerBottom = player.y + 24;
    const blockTop = block.y - block.displayHeight / 2;
    // Solo aterriza si viene de arriba; si choca de lado, muere
    if (player.body.velocity.y >= 0 && playerBottom - 12 <= blockTop) {
      player.body.setVelocityY(0);
      player.y = blockTop - 24;
      player.angle = 0;
    } else if (player.body.touching.left || player.body.blocked.left) {
      this.die();
    }
  }

  update(_, delta) {
    if (!this.gameStarted || this.paused || this.dead) return;

    // Mover estrellas para sensación de paralax
    const W = this.scale.width;
    this.bgStars.forEach(s => {
      s.x -= (s.speed * delta) / 1000;
      if (s.x < 0) { s.x = W; s.y = Phaser.Math.Between(0, this.scale.height * 0.7); }
    });

    // Distancia
    this.distance += (this.levelData.speed * delta) / 1000 / 8;
    document.getElementById("dist").textContent = Math.floor(this.distance);
    document.getElementById("qnum").textContent = this.qIndex;
    document.getElementById("progressBar").style.width = Math.min(100, (this.qIndex / 10) * 100) + "%";

    // Quiz cada 100m
    if (this.distance - this.lastQuizDist >= 100 && this.qIndex < this.questions.length) {
      this.lastQuizDist = this.distance;
      this.showQuiz();
    }
    // Victoria al pasar 100m tras la última pregunta
    if (this.qIndex >= this.questions.length && this.distance - this.lastQuizDist >= 80) {
      this.win();
    }

    // Mover el cursor de spawn con el mundo
    const dx = (this.levelData.speed * delta) / 1000;
    this.nextSpawnX -= dx;

    // Limpiar fuera de pantalla
    this.spikes.getChildren().forEach(o => { if (o.x < -100) o.destroy(); });
    this.blocks.getChildren().forEach(b => { if (b.x < -100) b.destroy(); });
  }

  showQuiz() {
    this.paused = true;
    this.physics.world.pause();
    this.spawnTimer.paused = true;

    const q = this.questions[this.qIndex];
    const diffEl = document.getElementById("qDifficulty");
    diffEl.textContent = `${q.diff} · ${this.qIndex + 1}/10`;
    diffEl.className = "diff-" + q.diff;
    document.getElementById("qText").textContent = q.q;

    const optsDiv = document.getElementById("qOpts");
    optsDiv.innerHTML = "";
    q.opts.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.onclick = () => this.answer(i === q.correct);
      optsDiv.appendChild(btn);
    });

    document.getElementById("quiz").classList.add("active");
  }

  answer(correct) {
    document.getElementById("quiz").classList.remove("active");
    this.qIndex++;
    if (!correct) { this.die(); return; }
    // Flash de acierto
    this.cameras.main.flash(200, 100, 255, 150);
    this.paused = false;
    this.physics.world.resume();
    this.spawnTimer.paused = false;
  }

  die() {
    if (this.dead) return;
    this.dead = true;
    this.cameras.main.shake(300, 0.02);
    this.cameras.main.flash(300, 255, 50, 50);
    // Explosión
    const ex = this.add.particles(this.player.x, this.player.y, "spark", {
      lifespan: 600, speed: { min: 100, max: 350 }, scale: { start: 1.2, end: 0 },
      tint: [0xff3355, 0xfde047, 0xffffff], quantity: 30, blendMode: "ADD"
    });
    this.player.setVisible(false);
    this.time.delayedCall(800, () => ex.destroy());

    this.physics.world.pause();
    this.spawnTimer.paused = true;
    this.time.delayedCall(900, () => this.endGame(false));
  }

  win() {
    if (this.dead) return;
    this.dead = true;
    this.physics.world.pause();
    this.spawnTimer.paused = true;
    unlockNext(this.levelIdx);
    this.endGame(true);
  }

  endGame(won) {
    document.getElementById("hud").classList.remove("active");
    document.getElementById("progressBar").style.display = "none";
    const screen = document.getElementById("endScreen");
    screen.classList.add("active");
    screen.classList.toggle("fail", !won);
    document.getElementById("endTitle").textContent = won ? "COMPLETAT!" : "HAS PERDUT";
    let msg = `Distància: ${Math.floor(this.distance)}m · Encerts: ${this.qIndex}/10`;
    if (won && this.levelIdx + 1 < LEVELS.length) {
      msg += `\nHas desbloquejat el nivell "${LEVELS[this.levelIdx + 1].name}"!`;
    }
    document.getElementById("endMsg").textContent = msg;
  }
}

function startLevel(idx) {
  currentLevel = idx;
  hideAll();
  if (game) { game.destroy(true); game = null; }
  game = new Phaser.Game({
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    parent: "game",
    backgroundColor: "#000",
    physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: [GameScene]
  });
  game.scene.start("GameScene", { level: idx });
}

function retryLevel() { startLevel(currentLevel); }
function backToSelect() {
  if (game) { game.destroy(true); game = null; }
  document.getElementById("hud").classList.remove("active");
  document.getElementById("progressBar").style.display = "none";
  goTo("selectScreen");
  renderLevels();
}

// ============================================
// NAVEGACIÓN PANTALLAS
// ============================================
function hideAll() {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
}
function goTo(id) {
  hideAll();
  document.getElementById(id).classList.add("active");
  if (id === "selectScreen") renderLevels();
}

// ============================================
// MENÚ DE NIVELES
// ============================================
function renderLevels() {
  const progress = loadProgress();
  const grid = document.getElementById("levelGrid");
  grid.innerHTML = "";
  LEVELS.forEach((lvl, i) => {
    const unlocked = i < progress.unlocked;
    const completed = progress.completed && progress.completed.includes(i);
    const card = document.createElement("div");
    card.className = "lvl-card" + (unlocked ? "" : " locked");
    card.style.background = `linear-gradient(160deg, #${lvl.bgTop.toString(16).padStart(6,"0")}, #${lvl.bgBot.toString(16).padStart(6,"0")})`;
    card.innerHTML = `
      ${completed ? '<span class="completed">⭐</span>' : ''}
      ${unlocked ? '' : '<span class="lock">🔒</span>'}
      <div class="num">${i + 1}</div>
      <div class="name">${lvl.name}</div>
      <div class="diff">${lvl.diff}</div>
    `;
    if (unlocked) card.onclick = () => startLevel(i);
    grid.appendChild(card);
  });
}

window.addEventListener("resize", () => {
  if (game && game.scale) game.scale.resize(window.innerWidth, window.innerHeight);
});
</script>
